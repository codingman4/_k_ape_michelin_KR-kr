<html lang="ko">
<head>

<title>🌲 Korea Michelin Map</title>
<style>
/* required styles */

.leaflet-pane,
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-tile-container,
.leaflet-pane > svg,
.leaflet-pane > canvas,
.leaflet-zoom-box,
.leaflet-image-layer,
.leaflet-layer {
	position: absolute;
	left: 0;
	top: 0;
	}
.leaflet-container {
	overflow: hidden;
	}
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow {
	-webkit-user-select: none;
	   -moz-user-select: none;
	        user-select: none;
	  -webkit-user-drag: none;
	}
/* Prevents IE11 from highlighting tiles in blue */
.leaflet-tile::selection {
	background: transparent;
}
/* Safari renders non-retina tile on retina better with this, but Chrome is worse */
.leaflet-safari .leaflet-tile {
	image-rendering: -webkit-optimize-contrast;
	}
/* hack that prevents hw layers "stretching" when loading new tiles */
.leaflet-safari .leaflet-tile-container {
	width: 1600px;
	height: 1600px;
	-webkit-transform-origin: 0 0;
	}
.leaflet-marker-icon,
.leaflet-marker-shadow {
	display: block;
	}
/* .leaflet-container svg: reset svg max-width decleration shipped in Joomla! (joomla.org) 3.x */
/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */
.leaflet-container .leaflet-overlay-pane svg {
	max-width: none !important;
	max-height: none !important;
	}
.leaflet-container .leaflet-marker-pane img,
.leaflet-container .leaflet-shadow-pane img,
.leaflet-container .leaflet-tile-pane img,
.leaflet-container img.leaflet-image-layer,
.leaflet-container .leaflet-tile {
	max-width: none !important;
	max-height: none !important;
	width: auto;
	padding: 0;
	}

.leaflet-container img.leaflet-tile {
	/* See: https://bugs.chromium.org/p/chromium/issues/detail?id=600120 */
	mix-blend-mode: plus-lighter;
}

.leaflet-container.leaflet-touch-zoom {
	-ms-touch-action: pan-x pan-y;
	touch-action: pan-x pan-y;
	}
.leaflet-container.leaflet-touch-drag {
	-ms-touch-action: pinch-zoom;
	/* Fallback for FF which doesn't support pinch-zoom */
	touch-action: none;
	touch-action: pinch-zoom;
}
.leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {
	-ms-touch-action: none;
	touch-action: none;
}
.leaflet-container {
	-webkit-tap-highlight-color: transparent;
}
.leaflet-container a {
	-webkit-tap-highlight-color: rgba(51, 181, 229, 0.4);
}
.leaflet-tile {
	filter: inherit;
	visibility: hidden;
	}
.leaflet-tile-loaded {
	visibility: inherit;
	}
.leaflet-zoom-box {
	width: 0;
	height: 0;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	z-index: 800;
	}
/* workaround for https://bugzilla.mozilla.org/show_bug.cgi?id=888319 */
.leaflet-overlay-pane svg {
	-moz-user-select: none;
	}

.leaflet-pane         { z-index: 400; }

.leaflet-tile-pane    { z-index: 200; }
.leaflet-overlay-pane { z-index: 400; }
.leaflet-shadow-pane  { z-index: 500; }
.leaflet-marker-pane  { z-index: 600; }

.leaflet-map-pane canvas { z-index: 100; }
.leaflet-map-pane svg    { z-index: 200; }

.leaflet-vml-shape {
	width: 1px;
	height: 1px;
	}
.lvml {
	behavior: url(#default#VML);
	display: inline-block;
	position: absolute;
	}


/* control positioning */

.leaflet-control {
	position: relative;
	z-index: 800;
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}
.leaflet-top,
.leaflet-bottom {
	position: absolute;
	z-index: 1000;
	pointer-events: none;
	}
.leaflet-top {
	top: 0;
	}
.leaflet-right {
	right: 0;
	}
.leaflet-bottom {
	bottom: 0;
	}
.leaflet-left {
	left: 0;
	}
.leaflet-control {
	float: left;
	clear: both;
	}
.leaflet-right .leaflet-control {
	float: right;
	}
.leaflet-top .leaflet-control {
	margin-top: 10px;
	}
.leaflet-bottom .leaflet-control {
	margin-bottom: 10px;
	}
.leaflet-left .leaflet-control {
	margin-left: 10px;
	}
.leaflet-right .leaflet-control {
	margin-right: 10px;
	}


/* zoom and fade animations */

.leaflet-fade-anim .leaflet-popup {
	opacity: 0;
	-webkit-transition: opacity 0.2s linear;
	   -moz-transition: opacity 0.2s linear;
	        transition: opacity 0.2s linear;
	}
.leaflet-fade-anim .leaflet-map-pane .leaflet-popup {
	opacity: 1;
	}
.leaflet-zoom-animated {
	-webkit-transform-origin: 0 0;
	    -ms-transform-origin: 0 0;
	        transform-origin: 0 0;
	}
svg.leaflet-zoom-animated {
	will-change: transform;
}

.leaflet-zoom-anim .leaflet-zoom-animated {
	-webkit-transition: -webkit-transform 0.25s cubic-bezier(0,0,0.25,1);
	   -moz-transition:    -moz-transform 0.25s cubic-bezier(0,0,0.25,1);
	        transition:         transform 0.25s cubic-bezier(0,0,0.25,1);
	}
.leaflet-zoom-anim .leaflet-tile,
.leaflet-pan-anim .leaflet-tile {
	-webkit-transition: none;
	   -moz-transition: none;
	        transition: none;
	}

.leaflet-zoom-anim .leaflet-zoom-hide {

	}


/* cursors */

.leaflet-interactive {
	cursor: pointer;
	}
.leaflet-grab {

	}

.leaflet-popup-pane,

.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-image-layer,
.leaflet-pane > svg path,
.leaflet-tile-container {

.leaflet-marker-icon.leaflet-interactive,

.leaflet-pane > svg path.leaflet-interactive,
svg.leaflet-image-layer.leaflet-interactive path {
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}

/* visual tweaks */

.leaflet-container {
	background: #ddd;

	}
.leaflet-container a {
	color: #0078A8;
	}
.leaflet-zoom-box {

	}


/* general typography */
.leaflet-container {
	font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
	font-size: 12px;
	font-size: 0.75rem;
	line-height: 1.5;
	}


/* general toolbar styles */

.leaflet-bar {
	box-shadow: 0 1px 5px rgba(0,0,0,0.65);
	border-radius: 4px;
	}
.leaflet-bar a {
	background-color: #fff;

	height: 26px;
	line-height: 26px;
	display: block;
	text-align: center;

	}

.leaflet-control-layers-toggle {

	}
.leaflet-bar a:hover,
.leaflet-bar a:focus {
	background-color: #f4f4f4;
	}
.leaflet-bar a:first-child {
	border-top-left-radius: 4px;
	border-top-right-radius: 4px;
	}
.leaflet-bar a:last-child {

	}

	}

.leaflet-touch .leaflet-bar a {

	}

/* zoom control */

.leaflet-control-zoom-in,
.leaflet-control-zoom-out {

	text-indent: 1px;
	}

.leaflet-touch .leaflet-control-zoom-in, .leaflet-touch .leaflet-control-zoom-out  {
	font-size: 22px;
	}


/* layers control */

.leaflet-control-layers {
	box-shadow: 0 1px 5px rgba(0,0,0,0.4);
	background: #fff;
	border-radius: 5px;
	}
.leaflet-control-layers-toggle {
	background-image: url(images/layers.png);

.leaflet-retina .leaflet-control-layers-toggle {

	}
.leaflet-touch .leaflet-control-layers-toggle {
	width: 44px;

	}
.leaflet-control-layers .leaflet-control-layers-list,
.leaflet-control-layers-expanded .leaflet-control-layers-toggle {

	}
.leaflet-control-layers-expanded .leaflet-control-layers-list {

	}

/* Default icon URLs */

	background-image: url(images/marker-icon.png);
	}


/* attribution and scale controls */

.leaflet-container .leaflet-control-attribution {

	}
.leaflet-control-attribution,
.leaflet-control-scale-line {

	}
.leaflet-attribution-flag {

	}
.leaflet-left .leaflet-control-scale {

.leaflet-bottom .leaflet-control-scale {

	}

.leaflet-touch .leaflet-control-attribution,

	}
.leaflet-touch .leaflet-control-layers,
.leaflet-touch .leaflet-bar {

	}


/* popup */

.leaflet-popup {
	position: absolute;
	text-align: center;
	margin-bottom: 20px;
	}
.leaflet-popup-content-wrapper {
	padding: 1px;

	}

	   -moz-transform: rotate(45deg);

.leaflet-popup-content-wrapper,

.leaflet-oldie .leaflet-control-zoom,

/* div icon */

.leaflet-div-icon {
	background: #fff;
	border: 1px solid #666;
	}


/* Tooltip */
/* Base styles for the element that has a tooltip */
.leaflet-tooltip {
	position: absolute;
	padding: 6px;
	background-color: #fff;
	border: 1px solid #fff;
	border-radius: 3px;
	color: #222;
	white-space: nowrap;
	-webkit-user-select: none;
	-moz-user-select: none;
	-ms-user-select: none;
	user-select: none;
	pointer-events: none;

	}
.leaflet-tooltip.leaflet-interactive {
	cursor: pointer;
	pointer-events: auto;
	}
.leaflet-tooltip-top:before,
.leaflet-tooltip-bottom:before,
.leaflet-tooltip-left:before,
.leaflet-tooltip-right:before {
	position: absolute;
	pointer-events: none;
	border: 6px solid transparent;
	background: transparent;
	content: "";
	}

/* Directions */

.leaflet-tooltip-bottom {
	margin-top: 6px;
}
.leaflet-tooltip-top {
	margin-top: -6px;
}
.leaflet-tooltip-bottom:before,
.leaflet-tooltip-top:before {
	left: 50%;
	margin-left: -6px;
	}
.leaflet-tooltip-top:before {
	bottom: 0;

.leaflet-tooltip-bottom:before {

	margin-top: -12px;
	margin-left: -6px;

	}
.leaflet-tooltip-left {

}
.leaflet-tooltip-right {
	margin-left: 6px;
}
.leaflet-tooltip-left:before,
.leaflet-tooltip-right:before {

	}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; height:100vh; overflow:hidden; }

/* ── SIDEBAR ── */
#sidebar {
  width:285px; min-width:285px;
  background:#1a1a2e; color:#eee;
  display:flex; flex-direction:column;
  z-index:1000;
  box-shadow:4px 0 20px rgba(0,0,0,0.5);
  transition:width 0.35s ease, min-width 0.35s ease;
  overflow:hidden;
}
#sidebar.hidden { width:0; min-width:0; }

/* ── GEAR BTN (fixed top-left, only when sidebar hidden) ── */
#gear-btn {
  display:none;
  position:fixed; top:0; left:0; z-index:2000;
  width:40px; height:40px;
  background:#1a1a2e; border:none; cursor:pointer;
  border-radius:0 0 10px 0;
  align-items:center; justify-content:center;
  box-shadow:2px 2px 8px rgba(0,0,0,0.5);
  transition:background 0.2s;
}
#gear-btn:hover { background:#2d2d4e; }
#gear-btn.visible { display:flex; }

/* ── HEADER ── */
#sidebar-header {
  background:linear-gradient(135deg,#e63946,#c1121f);
  flex-shrink:0;
  position:relative;
  padding:16px 16px 14px 16px;
}
.header-text h1 { font-size:14px; font-weight:700; color:white; margin-bottom:2px; white-space:nowrap; }
.header-text p { font-size:10px; color:rgba(255,255,255,0.7); white-space:nowrap; }

/* K← 버튼 — 배너 최우측 최상단, 배경 배너색에 녹아들도록 */
#collapse-btn {
  position:absolute;
  top:0; right:0;
  width:34px; height:34px;
  background:transparent;       /* 배너 그라디언트에 녹아들게 */
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:0 0 0 8px;
  transition:background 0.2s;
  padding:0;
}
#collapse-btn:hover {
  background:rgba(0,0,0,0.18); /* 호버 시에만 살짝 어둡게 */
}

/* ── BODY ── */
#sidebar-body { flex:1; overflow-y:auto; padding:12px; }
#sidebar-body::-webkit-scrollbar { width:4px; }
#sidebar-body::-webkit-scrollbar-thumb { background:#444; border-radius:2px; }

.section-title {
  font-size:10px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; color:#888; margin:12px 0 7px;
}
.section-title:first-child { margin-top:2px; }

#stat-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:5px; margin-bottom:4px;
}
.stat-badge {
  padding:7px 4px; border-radius:8px;
  background:rgba(255,255,255,0.05);
  text-align:center; border:1px solid rgba(255,255,255,0.08);
}
.stat-badge .num { font-size:16px; font-weight:700; color:#ffd166; }
.stat-badge .lbl { font-size:9px; color:#888; margin-top:1px; }

.layer-item {
  display:flex; align-items:center; gap:9px;
  padding:9px 10px; border-radius:10px; margin-bottom:5px;
  cursor:pointer; border:1px solid transparent;
  transition:all 0.2s; user-select:none; white-space:nowrap;
}
.layer-item:hover { background:rgba(255,255,255,0.05); }
.layer-item.active { border-color:rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); }
.layer-dot {
  width:30px; height:30px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}
.layer-info { flex:1; overflow:hidden; }
.layer-name { font-size:13px; font-weight:600; color:#eee; }
.layer-count { font-size:11px; color:#888; margin-top:1px; }
.layer-toggle {
  width:36px; height:20px; border-radius:10px;
  background:#333; position:relative; transition:all 0.2s; flex-shrink:0;
}
.layer-toggle.on { background:#4caf50; }
.layer-toggle::after {
  content:''; position:absolute; top:2px; left:2px;
  width:16px; height:16px; border-radius:50%;
  background:white; transition:all 0.2s;
}
.layer-toggle.on::after { left:18px; }

.price-row { display:flex; gap:5px; margin-top:2px; }
.price-btn {
  flex:1; padding:7px 4px; border-radius:8px;
  border:1.5px solid #333; background:transparent;
  color:#888; font-size:11px; font-weight:700;
  cursor:pointer; transition:all 0.2s; text-align:center;
}
.price-btn.active { border-color:#ffd166; background:rgba(255,209,102,0.12); color:#ffd166; }

#search-wrap { position:relative; margin-bottom:4px; }
#search {
  width:100%; padding:9px 34px 9px 12px;
  border-radius:8px; border:1px solid #333;
  background:rgba(255,255,255,0.05); color:#eee;
  font-size:13px; outline:none; transition:border-color 0.2s;
}
#search::placeholder { color:#555; }
#search:focus { border-color:#e63946; }
#search-icon {
  position:absolute; right:10px; top:50%;
  transform:translateY(-50%); color:#555; font-size:14px; pointer-events:none;
}

/* ── FOOTER ── */
#sidebar-footer {
  display:flex; align-items:center; gap:8px;
  padding:8px 10px;
  border-top:1px solid #2a2a3e;
  background:#161625; flex-shrink:0;
}
#profile-link {
  flex-shrink:0; display:block;
  width:42px; height:42px; border-radius:50%;
  overflow:hidden;
  border:2.5px solid #5B5EA6;   /* PMS 276 */
  cursor:pointer; transition:border-color 0.2s, box-shadow 0.2s; text-decoration:none;
  box-shadow: 0 0 6px #5B5EA688;
}
#profile-link:hover {
  border-color:#7B7FBF;
  box-shadow: 0 0 10px #5B5EA6;
}
#profile-link img { width:100%; height:100%; object-fit:cover; }
#footer-right { flex:1; display:flex; flex-direction:column; gap:5px; }
#visible-count { font-size:11px; color:#888; }
#visible-count span { color:#ffd166; font-weight:700; }
#reset-btn {
  padding:6px 10px; border-radius:7px;
  background:transparent; border:1px solid #333;
  color:#888; font-size:11px; cursor:pointer;
  transition:all 0.2s; text-align:center; white-space:nowrap;
}
#reset-btn:hover { border-color:#e63946; color:#e63946; }

/* ── MAP ── */
#map { flex:1; z-index:1; }

/* ── POPUP ── */
.mic-popup { min-width:220px; }
.mic-popup .pop-name { font-size:14px; font-weight:700; margin-bottom:5px; color:#1a1a2e; }
.mic-popup .pop-award {
  display:inline-flex; align-items:center; padding:3px 8px; border-radius:12px;
  font-size:11px; font-weight:700; color:white; margin-bottom:8px;
}
.mic-popup .pop-row { font-size:12px; color:#555; margin-bottom:3px; }
.mic-popup .pop-row b { color:#333; }
.mic-popup .pop-link {
  display:block; margin-top:8px; padding:6px 10px;
  background:#e63946; color:white; border-radius:6px;
  text-decoration:none; text-align:center; font-size:11px; font-weight:600;
}
.mic-popup .pop-link:hover { background:#c1121f; }
.pop-gs { display:inline-block; font-size:10px; background:#2d6a4f; color:white; padding:2px 6px; border-radius:4px; margin-left:5px; }
.leaflet-popup-content-wrapper { border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.2); }
.leaflet-popup-content { margin:14px 16px; }
.mic-marker {
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; border:2.5px solid white; font-weight:800; color:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.35); cursor:pointer;
}
</style>

  const c=AWARD_CONFIG[a];
  return L.divIcon({
    html:`<div class="mic-marker" style="background:${c.color};width:${c.size}px;height:${c.size}px;font-size:${a==='Bib Gourmand'?'14':'10'}px;">${c.label}</div>`,
    className:'',iconSize:[c.size,c.size],iconAnchor:[c.size/2,c.size/2],popupAnchor:[0,-c.size/2-4]
  });
}
function makePopup(r){
  const c=AWARD_CONFIG[r.aw];
  const gs=r.gs?'<span class="pop-gs">🌿 Green Star</span>':'';
  return `<div class="mic-popup">
    <div class="pop-name">${r.n}${gs}</div>
    <span class="pop-award" style="background:${c.color}">${r.aw}</span>
    <div class="pop-row">🍽️ <b>${r.c||'-'}</b></div>
    <div class="pop-row">💰 ${r.p} (${PRICE_LABELS[r.p]||''})</div>
    <div class="pop-row">📍 ${r.loc||r.a}</div>
    <a class="pop-link" href="${r.url}" target="_blank">미쉘린 가이드에서 보기 →</a>
  </div>`;
}

RESTAURANTS.forEach(r=>{
  const m=L.marker([r.lat,r.lng],{icon:createIcon(r.aw)});
  m.bindPopup(makePopup(r),{maxWidth:260});
  m._mic=r; allMarkers.push(m);
  layerGroups[r.aw].addLayer(m);
});

function updateMarkers(){
  let shown=0;
  allMarkers.forEach(m=>{
    const r=m._mic;
    const show=layerVisible[r.aw]&&priceVisible[r.p]&&
      (!searchTerm||r.n.toLowerCase().includes(searchTerm)||
       (r.c&&r.c.toLowerCase().includes(searchTerm))||
       (r.loc&&r.loc.toLowerCase().includes(searchTerm)));
    if(show){if(!layerGroups[r.aw].hasLayer(m))layerGroups[r.aw].addLayer(m);shown++;}
    else{layerGroups[r.aw].removeLayer(m);}
  });
  document.getElementById('shown-num').textContent=shown;
}
function toggleLayer(aw){
  layerVisible[aw]=!layerVisible[aw];
  document.getElementById(AWARD_CONFIG[aw].tid).classList.toggle('on',layerVisible[aw]);
  updateMarkers();
}
function togglePrice(p){
  priceVisible[p]=!priceVisible[p];
  document.getElementById(PRICE_IDS[p]).classList.toggle('active',priceVisible[p]);
  updateMarkers();
}
function resetFilters(){
  Object.keys(layerVisible).forEach(k=>layerVisible[k]=true);
  Object.keys(priceVisible).forEach(k=>priceVisible[k]=true);
  searchTerm=''; document.getElementById('search').value='';
  Object.values(AWARD_CONFIG).forEach(c=>document.getElementById(c.tid).classList.add('on'));
  Object.values(PRICE_IDS).forEach(id=>document.getElementById(id).classList.add('active'));
  updateMarkers();
}
function closeSidebar(){
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('gear-btn').classList.add('visible');
  setTimeout(()=>map.invalidateSize(),360);
}
function openSidebar(){
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('gear-btn').classList.remove('visible');
  setTimeout(()=>map.invalidateSize(),360);
}
document.getElementById('search').addEventListener('input',function(){
  searchTerm=this.value.toLowerCase().trim(); updateMarkers();
});
</script>
</body>
</html>
